services:
  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: dvwa_waf
    depends_on:
      - dvwa
    ports:
      - "8081:8080"
    environment:
      - BACKEND=http://dvwa:80
      - PORT=8080
      - SERVER_NAME=localhost
      - BLOCKING_PARANOIA=1
      - DETECTION_PARANOIA=1
    volumes:
      - ../waf/modsecurity_rules:/etc/modsecurity.d/local-rules:ro
