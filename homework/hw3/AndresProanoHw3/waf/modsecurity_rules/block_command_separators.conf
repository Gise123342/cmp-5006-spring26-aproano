# Bloquea separadores de comandos en argumentos HTTP.
# Uso exclusivo de laboratorio: probar solo en entornos controlados antes de cualquier uso productivo.

SecRule ARGS "@rx [;|]" \
    "id:1001001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Bloqueo de posible separador de command injection (; o |) en ARGS'"
