services:
  dvwa:
    image: vulnerables/web-dvwa
    expose:
      - "80"
    networks:
      - dvwa-net

  waf:
    image: owasp/modsecurity-crs:nginx-alpine
    ports:
      - "8080:8080"
    environment:
      - BACKEND=http://dvwa:80
      - PARANOIA=1
      - PORT=8080
    networks:
      - dvwa-net

networks:
  dvwa-net:
